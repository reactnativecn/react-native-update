name: Publish Package to npmjs
on:
  release:
    types: [published]

env:
  RELEASE_VERSION: ${{ github.event.release.tag_name || github.ref_name }}

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      harmony_changed: ${{ steps.check.outputs.changed }}
      prev_tag: ${{ steps.check.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Harmony changes
        id: check
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, assuming harmony changed."
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Previous tag is $PREV_TAG"
          if git diff --name-only "$PREV_TAG" HEAD | grep -q '^harmony/'; then
            echo "harmony directory changed."
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "harmony directory has NO changes."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  publish_with_harmony:
    needs: check_changes
    if: needs.check_changes.outputs.harmony_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # 1. Setup Node.js
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # 2. Setup JDK 17 (required by hvigor / DevEco toolchain)
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup OpenHarmony SDK (API Level 12 / 5.0.0 Release)
      - name: Setup OpenHarmony SDK
        uses: openharmony-rs/setup-ohos-sdk@v1.0.0
        id: setup-sdk
        with:
          version: '5.0.0'
          cache: 'true'

      # 4. Configure SDK Environment Variables & Find ohpm path
      - name: Configure SDK Environment Variables
        run: |
          echo "DEVECO_SDK_HOME=${{ steps.setup-sdk.outputs.sdk-path }}" >> $GITHUB_ENV
          echo "OHOS_SDK_HOME=${{ steps.setup-sdk.outputs.sdk-path }}" >> $GITHUB_ENV
          # Dynamically locate the ohpm executable and store its path in GITHUB_ENV
          OHPM_BIN_PATH=$(find ${{ steps.setup-sdk.outputs.sdk-path }} -name ohpm -type f | head -n 1)
          if [ -n "$OHPM_BIN_PATH" ]; then
            echo "OHPM_PATH=$OHPM_BIN_PATH" >> $GITHUB_ENV
            echo "Successfully found ohpm at $OHPM_BIN_PATH"
          else
            echo "Warning: ohpm executable not found in SDK"
          fi

      # 5. Setup Custom Hvigor wrapper
      - name: Setup Custom Hvigor wrapper
        run: |
          mkdir -p $HOME/hvigor-bin
          cd $HOME/hvigor-bin
          npm init -y
          npm config set @ohos:registry https://repo.harmonyos.com/npm/
          npm install @ohos/hvigor@6.26.1 @ohos/hvigor-ohos-plugin@6.26.1
          
          # Create hvigorw script at repo root
          cd ${{ github.workspace }}
          cat << 'EOF' > hvigorw
          #!/bin/bash
          node "$HOME/hvigor-bin/node_modules/@ohos/hvigor/bin/hvigor.js" "$@"
          EOF
          chmod +x hvigorw

      # 6. Setup Bun
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Build Harmony HAR
        env:
          HVIGORW_PATH: ${{ github.workspace }}/hvigorw
          OHPM_PATH: ${{ env.OHPM_PATH }}
        run: npm run build:harmony-har -- --build-mode release

      - name: Verify Harmony HAR artifact
        run: test -f harmony/pushy.har

      - name: Publish to npm
        shell: bash
        run: |
          if [[ "${{ github.event.release.tag_name }}" == *"beta"* ]]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi

  publish_without_harmony:
    needs: check_changes
    if: needs.check_changes.outputs.harmony_changed == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Configure git safe.directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule foreach --recursive 'git config --global --add safe.directory "$toplevel/$sm_path"'
      - uses: oven-sh/setup-bun@v2
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - name: Fetch previous Harmony HAR
        shell: bash
        run: |
          PREV_VERSION="${{ needs.check_changes.outputs.prev_tag }}"
          PREV_VERSION="${PREV_VERSION#v}"
          echo "Attempting to fetch harmony/pushy.har from react-native-update@$PREV_VERSION"
          npm pack react-native-update@$PREV_VERSION || true
          tar -xzf react-native-update-${PREV_VERSION}.tgz package/harmony/pushy.har || true
          if [ -f package/harmony/pushy.har ]; then
            mkdir -p harmony
            cp package/harmony/pushy.har harmony/pushy.har
            echo "Successfully restored pushy.har from previous release."
          else
            echo "No harmony/pushy.har found in previous release or fetch failed."
          fi
          # Clean up temporary pack and extraction files to prevent publishing them
          rm -rf react-native-update-${PREV_VERSION}.tgz package || true
      - name: Publish to npm
        shell: bash
        run: |
          if [[ "${{ github.event.release.tag_name }}" == *"beta"* ]]; then
            npm publish --provenance --access public --tag beta
          else
            npm publish --provenance --access public
          fi
